{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Catalogue Manager</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Payroc Branding: Navy #001D4E, Cobalt #0051C2, Mint #00e0b8 */

        /* ── Animated gradient background ── */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001D4E 0%, #0051C2 40%, #001D4E 70%, #003d91 100%);
            background-size: 300% 300%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Floating particles ── */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
        }

        .particle:nth-child(1) {
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(0, 224, 184, 0.08) 0%, transparent 70%);
            top: 15%; left: 10%;
            animation-duration: 20s;
        }
        .particle:nth-child(2) {
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(0, 81, 194, 0.1) 0%, transparent 70%);
            top: 60%; right: 15%;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        .particle:nth-child(3) {
            width: 90px; height: 90px;
            background: radial-gradient(circle, rgba(0, 224, 184, 0.06) 0%, transparent 70%);
            bottom: 20%; left: 25%;
            animation-duration: 18s;
            animation-delay: -8s;
        }
        .particle:nth-child(4) {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(0, 81, 194, 0.06) 0%, transparent 70%);
            top: 10%; right: 30%;
            animation-duration: 22s;
            animation-delay: -3s;
        }
        .particle:nth-child(5) {
            width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(0, 224, 184, 0.1) 0%, transparent 70%);
            top: 45%; left: 60%;
            animation-duration: 16s;
            animation-delay: -10s;
        }
        .particle:nth-child(6) {
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(0, 81, 194, 0.07) 0%, transparent 70%);
            bottom: 10%; right: 10%;
            animation-duration: 24s;
            animation-delay: -7s;
        }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(30px, -40px) scale(1.05); }
            50%  { transform: translate(-20px, 20px) scale(0.95); }
            75%  { transform: translate(15px, -15px) scale(1.02); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: 0 12px 48px rgba(0, 29, 78, 0.35);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #001D4E, #0051C2);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            color: white;
            font-size: 1.2rem;
        }

        .login-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #001D4E;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
        }

        /* ── Form ── */
        .form-label {
            font-weight: 500;
            font-size: 0.8rem;
            color: #001D4E;
        }

        .form-control {
            font-size: 0.85rem;
            border: 1px solid #d1d5db;
            padding: 0.6rem 0.75rem;
        }

        .form-control:focus {
            border-color: #0051C2;
            box-shadow: 0 0 0 3px rgba(0, 81, 194, 0.1);
        }

        .btn-primary {
            background: #0051C2;
            border: none;
            padding: 0.65rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #003d91;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-footer-text {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 1.25rem;
            margin-bottom: 0;
        }

        /* ── Page footer ── */
        .page-footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Login card -->
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1>Training Catalogue Manager</h1>
            <p>Sign in to continue</p>
        </div>

        <hr class="my-3" style="border-color: #e5e7eb;">

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.8rem;">
            {{ message }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="login-footer-text">
            Forgot password? Contact your administrator.
        </p>
    </div>

    <!-- Page footer -->
    <div class="page-footer">Powered by Payroc</div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
