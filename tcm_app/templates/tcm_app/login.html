{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Catalogue Manager</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Payroc: Navy #001D4E, Cobalt #0051C2, Mint #00e0b8 */

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #001D4E;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ── Gradient orbs ── */
        .orb-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 81, 194, 0.5) 0%, transparent 70%);
            top: -10%; left: -5%;
            animation: drift1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(0, 224, 184, 0.3) 0%, transparent 70%);
            bottom: -15%; right: -5%;
            animation: drift2 25s ease-in-out infinite;
        }

        .orb-3 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(0, 81, 194, 0.35) 0%, transparent 70%);
            top: 50%; right: 25%;
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(60px, 40px) scale(1.05); }
            66%      { transform: translate(-30px, 20px) scale(0.95); }
        }

        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(-50px, -30px) scale(1.08); }
            66%      { transform: translate(40px, -20px) scale(0.92); }
        }

        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(30px, -50px) scale(1.1); }
            66%      { transform: translate(-40px, 30px) scale(0.9); }
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: 0 12px 48px rgba(0, 29, 78, 0.35);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-monogram {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #001D4E 0%, #0051C2 60%, #00e0b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        .login-subtitle {
            font-size: 0.8rem;
            font-weight: 400;
            color: #6b7280;
            letter-spacing: 0.5px;
            margin-bottom: 0.15rem;
        }

        .login-tagline {
            color: #9ca3af;
            font-size: 0.7rem;
            margin: 0;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.8rem;
            color: #001D4E;
        }

        .form-control {
            font-size: 0.85rem;
            border: 1px solid #d1d5db;
            padding: 0.6rem 0.75rem;
        }

        .form-control:focus {
            border-color: #0051C2;
            box-shadow: 0 0 0 3px rgba(0, 81, 194, 0.1);
        }

        .btn-primary {
            background: #0051C2;
            border: none;
            padding: 0.65rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #003d91;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-footer-text {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 1.25rem;
            margin-bottom: 0;
        }

        .page-footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0; right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <!-- Gradient orbs -->
    <div class="orb-container" id="orbContainer">
        <div class="orb orb-1" id="orb1"></div>
        <div class="orb orb-2" id="orb2"></div>
        <div class="orb orb-3" id="orb3"></div>
    </div>

    <!-- Login card -->
    <div class="login-card">
        <div class="login-header">
            <div class="login-monogram">TCM</div>
            <div class="login-subtitle">Training Catalogue Manager</div>
            <div class="login-tagline">Sign in to continue</div>
        </div>

        <hr class="my-3" style="border-color: #e5e7eb;">

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.8rem;">
            {{ message }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="login-footer-text">
            Forgot password? Contact your administrator.
        </p>
    </div>

    <!-- Page footer -->
    <div class="page-footer">Powered by Payroc</div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
    // Orbs lean gently toward the cursor
    (function() {
        const orbs = document.querySelectorAll('.orb');
        const strength = [0.03, 0.025, 0.035]; // different sensitivity per orb
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetX = mouseX, targetY = mouseY;
        let currentX = mouseX, currentY = mouseY;

        document.addEventListener('mousemove', function(e) {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        function animate() {
            // Smooth lerp toward mouse
            currentX += (targetX - currentX) * 0.04;
            currentY += (targetY - currentY) * 0.04;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const offsetX = currentX - centerX;
            const offsetY = currentY - centerY;

            orbs.forEach(function(orb, i) {
                const s = strength[i];
                const tx = offsetX * s;
                const ty = offsetY * s;
                orb.style.transform = 'translate(' + tx + 'px, ' + ty + 'px)';
            });

            requestAnimationFrame(animate);
        }

        animate();
    })();
    </script>
</body>

</html>
