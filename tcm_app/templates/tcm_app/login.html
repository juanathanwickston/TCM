{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Catalogue Manager</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Payroc: Navy #001D4E, Cobalt #0051C2, Mint #00e0b8 */

        @font-face {
            font-family: 'Geist';
            src: url("{% static 'fonts/Geist-Regular.woff2' %}") format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Geist';
            src: url("{% static 'fonts/Geist-SemiBold.woff2' %}") format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #060a14;
            overflow: hidden;
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #starCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            opacity: 0;
            transform: translateY(4px);
            animation: cardAppear 0.8s ease-out 0.3s forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo {
            width: 140px;
            height: auto;
            margin-bottom: 0.75rem;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .login-subtitle {
            font-size: 0.8rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            margin-bottom: 0.15rem;
        }

        .login-tagline {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            margin: 0;
            font-style: italic;
            opacity: 0;
            animation: taglineFade 0.6s ease-out 1.1s forwards;
        }

        @keyframes taglineFade {
            to { opacity: 1; }
        }

        hr.divider {
            border-color: rgba(255, 255, 255, 0.08);
        }

        .form-label {
            font-weight: 500;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-control {
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-control:focus {
            border-color: #0051C2;
            box-shadow: 0 0 0 3px rgba(0, 81, 194, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .btn-primary {
            background: #0051C2;
            border: none;
            padding: 0.65rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #003d91;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-footer-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            margin-top: 1.25rem;
            margin-bottom: 0;
        }

        .page-footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0; right: 0;
            text-align: center;
            z-index: 1;
        }

        .page-footer a {
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .page-footer a:hover {
            opacity: 0.6;
        }

        .page-footer img {
            height: 20px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        /* Alert styling for dark bg */
        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            border-color: rgba(220, 53, 69, 0.3);
            color: #f8a4ad;
        }
    </style>
</head>

<body>
    <canvas id="starCanvas"></canvas>

    <!-- Login card -->
    <div class="login-card">
        <div class="login-header">
            <img src="{% static 'img/payroc-logo.svg' %}" alt="Payroc" class="login-logo">
            <div class="login-subtitle">Training Catalogue Manager</div>
            <div class="login-tagline">Built for the people who build people.</div>
        </div>

        <hr class="my-3 divider">

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.8rem;">
            {{ message }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="login-footer-text">
            Forgot password? Contact your administrator.
        </p>
    </div>

    <div class="page-footer">
        <a href="https://payroc.com" target="_blank" rel="noopener">
            <img src="{% static 'img/poweredby.svg' %}" alt="Powered by Payroc">
        </a>
    </div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
    (function() {
        var canvas = document.getElementById('starCanvas');
        var ctx = canvas.getContext('2d');
        var w, h;

        // ── Configuration ──
        var STAR_LAYERS = [
            { count: 120, sizeMin: 0.3, sizeMax: 0.8,  alphaMin: 0.15, alphaMax: 0.35, speed: 0.02 },  // distant
            { count:  60, sizeMin: 0.6, sizeMax: 1.2,  alphaMin: 0.25, alphaMax: 0.50, speed: 0.06 },  // mid
            { count:  25, sizeMin: 1.0, sizeMax: 1.8,  alphaMin: 0.35, alphaMax: 0.65, speed: 0.12 },  // near
        ];

        // Payroc-tinted star colors — subtle, not saturated
        var STAR_COLORS = [
            { r: 180, g: 200, b: 255 },   // cool white-blue
            { r: 200, g: 210, b: 240 },   // soft white
            { r: 160, g: 190, b: 255 },   // light cobalt tint
            { r: 180, g: 230, b: 220 },   // faint mint tint
            { r: 220, g: 220, b: 240 },   // warm white
        ];

        var stars = [];
        var northStar = null;
        var shootingStar = null;
        var nextShootingStarTime = 0;

        function resize() {
            w = canvas.width  = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        // ── Stars ──
        function createStar(layer) {
            var color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
            return {
                x: Math.random() * w,
                y: Math.random() * h,
                r: layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin),
                alpha: layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin),
                baseAlpha: 0,
                color: color,
                speed: layer.speed * (0.8 + Math.random() * 0.4),
                // Twinkle: each star on its own cycle (4-12 seconds)
                twinkleSpeed: (0.0008 + Math.random() * 0.002),
                twinklePhase: Math.random() * Math.PI * 2,
                twinkleDepth: 0.15 + Math.random() * 0.25,  // how much alpha varies
            };
        }

        function initStars() {
            stars = [];
            for (var l = 0; l < STAR_LAYERS.length; l++) {
                var layer = STAR_LAYERS[l];
                for (var i = 0; i < layer.count; i++) {
                    var s = createStar(layer);
                    s.baseAlpha = s.alpha;
                    stars.push(s);
                }
            }
        }

        // ── North Star ──
        // Fixed position (upper-right quadrant), slightly brighter, subtle glow
        function initNorthStar() {
            northStar = {
                x: w * (0.75 + Math.random() * 0.1),
                y: h * (0.12 + Math.random() * 0.08),
                r: 1.6,
                baseAlpha: 0.7,
                glowR: 6,
                glowAlpha: 0.06,
                pulsePhase: 0,
                pulseSpeed: 0.003,
                hovered: false,
            };
        }

        // ── Shooting Star ──
        function scheduleShootingStar() {
            // 45-90 seconds from now
            nextShootingStarTime = Date.now() + (45000 + Math.random() * 45000);
        }

        function spawnShootingStar() {
            // Random start position, biased toward top half
            var startX = Math.random() * w;
            var startY = Math.random() * h * 0.4;
            // Random angle (mostly horizontal, slight downward)
            var angle = (Math.random() * 0.4 + 0.1) * (Math.random() < 0.5 ? 1 : -1);
            var speed = 4 + Math.random() * 3;
            var dx = Math.cos(angle) * speed;
            var dy = Math.abs(Math.sin(angle)) * speed * 0.4 + speed * 0.2;

            shootingStar = {
                x: startX, y: startY,
                dx: dx, dy: dy,
                alpha: 1.0,
                length: 60 + Math.random() * 40,
                decay: 0.015 + Math.random() * 0.005,
                trail: [],
            };
        }

        // ── Tooltip for North Star ──
        var tooltip = document.createElement('div');
        tooltip.textContent = 'Your source of truth.';
        tooltip.style.cssText = 'position:fixed;padding:4px 10px;background:rgba(0,0,0,0.7);color:rgba(255,255,255,0.7);font-size:11px;border-radius:4px;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.3s;font-family:Geist,sans-serif;letter-spacing:0.3px;';
        document.body.appendChild(tooltip);

        canvas.style.pointerEvents = 'auto';
        canvas.style.cursor = 'default';

        canvas.addEventListener('mousemove', function(e) {
            if (!northStar) return;
            var dx = e.clientX - northStar.x;
            var dy = e.clientY - northStar.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 20) {
                northStar.hovered = true;
                tooltip.style.opacity = '1';
                tooltip.style.left = (northStar.x + 12) + 'px';
                tooltip.style.top = (northStar.y - 8) + 'px';
            } else {
                northStar.hovered = false;
                tooltip.style.opacity = '0';
            }
        });

        // ── Render ──
        function drawStar(x, y, r, color, alpha) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',' + alpha + ')';
            ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);

            // Draw background gradient (very subtle deep navy)
            var grad = ctx.createRadialGradient(w * 0.5, h * 0.4, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.8);
            grad.addColorStop(0, 'rgba(0, 20, 50, 0.15)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                // Slow drift (leftward, simulating sky rotation)
                s.x -= s.speed;
                if (s.x < -5) s.x = w + 5;

                // Twinkle
                s.twinklePhase += s.twinkleSpeed;
                var twinkle = 1 - s.twinkleDepth + s.twinkleDepth * (0.5 + 0.5 * Math.sin(s.twinklePhase));
                var alpha = s.baseAlpha * twinkle;

                drawStar(s.x, s.y, s.r, s.color, alpha);
            }

            // North Star
            if (northStar) {
                northStar.pulsePhase += northStar.pulseSpeed;
                var nsPulse = 0.85 + 0.15 * Math.sin(northStar.pulsePhase);
                var nsAlpha = northStar.baseAlpha * nsPulse;

                // Subtle glow
                var glowAlpha = northStar.glowAlpha * nsPulse;
                if (northStar.hovered) glowAlpha *= 2;
                ctx.beginPath();
                ctx.arc(northStar.x, northStar.y, northStar.glowR, 0, Math.PI * 2);
                var nsGrad = ctx.createRadialGradient(northStar.x, northStar.y, 0, northStar.x, northStar.y, northStar.glowR);
                nsGrad.addColorStop(0, 'rgba(180, 210, 255, ' + glowAlpha + ')');
                nsGrad.addColorStop(1, 'rgba(180, 210, 255, 0)');
                ctx.fillStyle = nsGrad;
                ctx.fill();

                // Core dot
                drawStar(northStar.x, northStar.y, northStar.hovered ? 2.0 : northStar.r, { r: 200, g: 220, b: 255 }, nsAlpha);
            }

            // Shooting Star
            var now = Date.now();
            if (!shootingStar && now >= nextShootingStarTime) {
                spawnShootingStar();
            }

            if (shootingStar) {
                var ss = shootingStar;
                ss.trail.unshift({ x: ss.x, y: ss.y, alpha: ss.alpha });

                ss.x += ss.dx;
                ss.y += ss.dy;
                ss.alpha -= ss.decay;

                // Draw trail
                var maxTrailLen = 20;
                if (ss.trail.length > maxTrailLen) ss.trail.length = maxTrailLen;

                for (var t = 0; t < ss.trail.length; t++) {
                    var tp = ss.trail[t];
                    var ta = tp.alpha * (1 - t / maxTrailLen) * 0.6;
                    var tr = 1.2 * (1 - t / maxTrailLen);
                    if (ta > 0.01) {
                        drawStar(tp.x, tp.y, tr, { r: 220, g: 230, b: 255 }, ta);
                    }
                }

                // Draw head
                if (ss.alpha > 0.01) {
                    drawStar(ss.x, ss.y, 1.5, { r: 240, g: 245, b: 255 }, ss.alpha);
                }

                // Remove when faded or off screen
                if (ss.alpha <= 0 || ss.x < -100 || ss.x > w + 100 || ss.y > h + 100) {
                    shootingStar = null;
                    scheduleShootingStar();
                }
            }

            requestAnimationFrame(animate);
        }

        // ── Init ──
        resize();
        initStars();
        initNorthStar();
        scheduleShootingStar();

        window.addEventListener('resize', function() {
            resize();
            initNorthStar(); // reposition north star
        });

        animate();
    })();
    </script>
</body>

</html>
