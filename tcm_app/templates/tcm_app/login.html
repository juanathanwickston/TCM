{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Catalogue Manager</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Payroc Branding: Navy #001D4E, Cobalt #0051C2, Mint #00e0b8 */

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001D4E 0%, #0051C2 40%, #001D4E 70%, #003d91 100%);
            background-size: 300% 300%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Canvas ── */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: 0 12px 48px rgba(0, 29, 78, 0.35);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #001D4E, #0051C2);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            color: white;
            font-size: 1.2rem;
        }

        .login-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #001D4E;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.8rem;
            color: #001D4E;
        }

        .form-control {
            font-size: 0.85rem;
            border: 1px solid #d1d5db;
            padding: 0.6rem 0.75rem;
        }

        .form-control:focus {
            border-color: #0051C2;
            box-shadow: 0 0 0 3px rgba(0, 81, 194, 0.1);
        }

        .btn-primary {
            background: #0051C2;
            border: none;
            padding: 0.65rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #003d91;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-footer-text {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 1.25rem;
            margin-bottom: 0;
        }

        .page-footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <!-- Particle canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Login card -->
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1>Training Catalogue Manager</h1>
            <p>Sign in to continue</p>
        </div>

        <hr class="my-3" style="border-color: #e5e7eb;">

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.8rem;">
            {{ message }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="login-footer-text">
            Forgot password? Contact your administrator.
        </p>
    </div>

    <!-- Page footer -->
    <div class="page-footer">Powered by Payroc</div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
    (function() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // ── Config ──
        const PARTICLE_COUNT = 55;
        const CONNECT_DIST   = 140;   // max distance to draw lines between particles
        const MOUSE_RADIUS   = 180;   // magnetic attraction radius
        const MOUSE_STRENGTH = 0.02;  // how strongly particles pull toward cursor
        const RETURN_SPEED   = 0.008; // how fast particles drift back when cursor leaves

        // Payroc palette with varying opacity
        const COLORS = [
            'rgba(0, 224, 184, ',   // mint
            'rgba(0, 81, 194, ',    // cobalt
            'rgba(255, 255, 255, ', // white
        ];

        let mouse = { x: -1000, y: -1000 };
        let particles = [];
        let w, h;

        function resize() {
            w = canvas.width  = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x  = Math.random() * w;
                this.y  = Math.random() * h;
                this.ox = this.x;  // origin x (home position)
                this.oy = this.y;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.r  = Math.random() * 2 + 1;
                this.colorIdx = Math.floor(Math.random() * COLORS.length);
                this.alpha = Math.random() * 0.5 + 0.3;
            }

            update() {
                // Distance to mouse
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < MOUSE_RADIUS) {
                    // Magnetic pull toward cursor
                    const force = (1 - dist / MOUSE_RADIUS) * MOUSE_STRENGTH;
                    this.vx += dx * force;
                    this.vy += dy * force;
                } else {
                    // Gently drift back toward origin
                    this.vx += (this.ox - this.x) * RETURN_SPEED;
                    this.vy += (this.oy - this.y) * RETURN_SPEED;
                }

                // Damping
                this.vx *= 0.96;
                this.vy *= 0.96;

                this.x += this.vx;
                this.y += this.vy;

                // Slow origin drift for ambient movement
                this.ox += (Math.random() - 0.5) * 0.15;
                this.oy += (Math.random() - 0.5) * 0.15;

                // Wrap origins if they drift off screen
                if (this.ox < -20) this.ox = w + 20;
                if (this.ox > w + 20) this.ox = -20;
                if (this.oy < -20) this.oy = h + 20;
                if (this.oy > h + 20) this.oy = -20;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = COLORS[this.colorIdx] + this.alpha + ')';
                ctx.fill();
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                const a = particles[i];

                // Lines between particles
                for (let j = i + 1; j < particles.length; j++) {
                    const b = particles[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONNECT_DIST) {
                        const opacity = (1 - dist / CONNECT_DIST) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = 'rgba(0, 224, 184, ' + opacity + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }

                // Lines from particle to mouse
                const mdx = a.x - mouse.x;
                const mdy = a.y - mouse.y;
                const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

                if (mDist < MOUSE_RADIUS) {
                    const opacity = (1 - mDist / MOUSE_RADIUS) * 0.25;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + opacity + ')';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);

            for (const p of particles) {
                p.update();
                p.draw();
            }

            drawConnections();
            requestAnimationFrame(animate);
        }

        // ── Init ──
        resize();
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        // Allow pointer events to pass through to the form
        document.addEventListener('mousemove', function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        document.addEventListener('mouseleave', function() {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        window.addEventListener('resize', function() {
            resize();
            // Reset origins on resize
            for (const p of particles) {
                p.ox = Math.random() * w;
                p.oy = Math.random() * h;
            }
        });

        animate();
    })();
    </script>
</body>

</html>
