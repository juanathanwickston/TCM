{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Catalogue Manager</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Payroc: Navy #001D4E, Cobalt #0051C2, Mint #00e0b8 */

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fc;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 29, 78, 0.1), 0 1px 3px rgba(0, 29, 78, 0.06);
            border: 1px solid rgba(0, 29, 78, 0.06);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo {
            width: 140px;
            height: auto;
            margin-bottom: 0.75rem;
        }

        .login-subtitle {
            font-size: 0.8rem;
            font-weight: 400;
            color: #6b7280;
            letter-spacing: 0.5px;
            margin-bottom: 0.15rem;
        }

        .login-tagline {
            color: #9ca3af;
            font-size: 0.7rem;
            margin: 0;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.8rem;
            color: #001D4E;
        }

        .form-control {
            font-size: 0.85rem;
            border: 1px solid #d1d5db;
            padding: 0.6rem 0.75rem;
        }

        .form-control:focus {
            border-color: #0051C2;
            box-shadow: 0 0 0 3px rgba(0, 81, 194, 0.1);
        }

        .btn-primary {
            background: #0051C2;
            border: none;
            padding: 0.65rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #003d91;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-footer-text {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 1.25rem;
            margin-bottom: 0;
        }

        .page-footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0; right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(0, 29, 78, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas"></canvas>

    <!-- Login card -->
    <div class="login-card">
        <div class="login-header">
            <img src="{% static 'img/payroc-logo.svg' %}" alt="Payroc" class="login-logo">
            <div class="login-subtitle">Training Catalogue Manager</div>
            <div class="login-tagline">Sign in to continue</div>
        </div>

        <hr class="my-3" style="border-color: #e5e7eb;">

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size: 0.8rem;">
            {{ message }}
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="login-footer-text">
            Forgot password? Contact your administrator.
        </p>
    </div>

    <div class="page-footer">Powered by Payroc</div>

    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
    (function() {
        var canvas = document.getElementById('particleCanvas');
        var ctx = canvas.getContext('2d');

        var PARTICLE_COUNT = 150;
        var GRAVITY        = 800;    // gravitational constant
        var MAX_FORCE      = 0.5;    // cap so particles don't slingshot
        var DAMPING        = 0.998;  // very light drag — feels like space
        var MIN_DIST       = 40;     // softening distance to avoid singularity

        // Payroc dark palette
        var COLORS = [
            {r: 0, g: 29, b: 78},    // navy
            {r: 0, g: 81, b: 194},   // cobalt
            {r: 0, g: 51, b: 145},   // deep cobalt
            {r: 0, g: 178, b: 146},  // muted mint
        ];

        var mouse = {x: -1000, y: -1000, active: false};
        var particles = [];
        var w, h;

        function resize() {
            w = canvas.width  = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function Particle() {
            this.x  = Math.random() * w;
            this.y  = Math.random() * h;
            // Very slow initial drift — floating through space
            var angle = Math.random() * Math.PI * 2;
            var speed = Math.random() * 0.3 + 0.05;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            // Varied sizes: tiny stars to larger moons
            this.r  = Math.random() * 3.5 + 0.5;
            this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.alpha = Math.random() * 0.35 + 0.1;
            // Twinkle
            this.twinkleSpeed = Math.random() * 0.01 + 0.003;
            this.twinklePhase = Math.random() * Math.PI * 2;
        }

        Particle.prototype.update = function() {
            // Gravitational pull toward cursor
            if (mouse.active) {
                var dx = mouse.x - this.x;
                var dy = mouse.y - this.y;
                var distSq = dx * dx + dy * dy;
                var dist = Math.sqrt(distSq);

                // Inverse-square gravity, softened at close range
                if (dist > 1) {
                    var softenedDist = Math.max(dist, MIN_DIST);
                    var force = GRAVITY / (softenedDist * softenedDist);
                    force = Math.min(force, MAX_FORCE);
                    var fx = (dx / dist) * force;
                    var fy = (dy / dist) * force;
                    this.vx += fx;
                    this.vy += fy;
                }
            }

            // Very light damping — particles glide
            this.vx *= DAMPING;
            this.vy *= DAMPING;

            this.x += this.vx;
            this.y += this.vy;

            // Wrap around screen edges — infinite space feel
            if (this.x < -10) this.x = w + 10;
            if (this.x > w + 10) this.x = -10;
            if (this.y < -10) this.y = h + 10;
            if (this.y > h + 10) this.y = -10;

            // Gentle twinkle
            this.twinklePhase += this.twinkleSpeed;
        };

        Particle.prototype.draw = function() {
            var twinkle = 0.7 + 0.3 * Math.sin(this.twinklePhase);
            var a = this.alpha * twinkle;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + this.color.r + ',' + this.color.g + ',' + this.color.b + ',' + a + ')';
            ctx.fill();
        };

        function animate() {
            ctx.clearRect(0, 0, w, h);
            for (var i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        resize();
        for (var i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        document.addEventListener('mousemove', function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        document.addEventListener('mouseleave', function() {
            mouse.active = false;
        });

        window.addEventListener('resize', resize);

        animate();
    })();
    </script>
</body>

</html>
